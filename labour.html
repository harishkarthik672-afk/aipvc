<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Labour Portal</title>
    <script>if (localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');</script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .content-section { display: none; animation: fadeIn 0.4s ease-out; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .job-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 6px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .btn-apply { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin-top: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 20px rgba(234, 67, 53, 0.2); }
        .finish-preview-box { width: 100%; height: 180px; border: 2px dashed #ddd; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 15px 0; background: #fafafa; }
        .finish-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .finish-btn { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; display: none; margin-top: 10px; }
        .contact-badge { display: inline-flex; align-items: center; gap: 8px; background: #eef2f7; padding: 8px 15px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; color: #333; margin-top: 10px; }
    </style>
</head>
<body style="background-color: #f7f9fc;">
    <div class="app-container" style="padding-bottom: 100px;">
        <header class="top-header">
            <div class="brand-text">AI <span>LABOUR</span></div>
            <div class="header-icons">
                <div class="bell-icon-wrapper" onclick="switchSection('news')">
                    <i class="fa-solid fa-bell"></i>
                </div>
                <img src="https://ui-avatars.com/api/?name=Labour" class="profile-avatar" id="globalAvatar" onclick="switchSection('more')">
            </div>
        </header>

        <div id="section-home" class="content-section active">
            <div style="margin: 20px 15px;"><img src="card1.jpeg" style="width: 100%; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);"></div>
            <div style="padding: 20px;">
                <h3 style="margin-bottom: 15px;">Available Opportunities</h3>
                <div id="homeJobFeed"></div>
            </div>
        </div>

        <div id="section-job" class="content-section">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:20px;">Work Explorer</h2>
                <div id="explorerFeed"></div>
            </div>
        </div>

        <div id="section-booked" class="content-section">
            <div style="padding: 20px;">
                <h2 style="margin-bottom:20px;">My Active Work</h2>
                <div id="activeWorkFeed"></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" onclick="switchSection('home', this)"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('job', this)"><i class="fa-solid fa-magnifying-glass"></i><span>Find</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('booked', this)"><i class="fa-solid fa-calendar-check"></i><span>Active</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('more', this)"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB7tt8p6hUZhrGvW58jSFhYFnB--7cI4Dg", authDomain: "ai-pvc.firebaseapp.com", projectId: "ai-pvc", storageBucket: "ai-pvc.firebasestorage.app", messagingSenderId: "674939624886", appId: "1:674939624886:web:7fa074e73af3449929f517" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const uid = localStorage.getItem('userUid');
        const userDistrict = (localStorage.getItem('userDistrict') || 'Chennai').toLowerCase();
        const userName = localStorage.getItem('userName') || 'Labour';
        const userMobile = localStorage.getItem('userMobile') || '9999999999';

        window.switchSection = (id, el) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id==='home' || id==='job') loadJobFeed();
            if(id==='booked') loadActiveWork();
            window.scrollTo(0,0);
        };

        function loadJobFeed() {
            onValue(ref(db, 'posts'), (snap) => {
                document.getElementById('homeJobFeed').innerHTML = '';
                document.getElementById('explorerFeed').innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.district.toLowerCase() === userDistrict && p.status === 'available') {
                        const card = `<div class="job-card">
                            <h4 style="margin:0 0 10px;">${p.workName}</h4>
                            <img src="${p.workImage}" style="width:100%; border-radius:10px;">
                            <button class="btn-apply" onclick="bookJob('${p.postId}')">Quick Book</button>
                        </div>`;
                        document.getElementById('homeJobFeed').innerHTML += card;
                        document.getElementById('explorerFeed').innerHTML += card;
                    }
                });
            });
        }

        window.bookJob = async (id) => {
            const pRef = ref(db, `posts/${id}`);
            onValue(pRef, async (snap) => {
                const p = snap.val();
                if(p && p.status === 'available') {
                    const bRef = push(ref(db, 'bookings'));
                    await set(bRef, {
                        bookingId: bRef.key, postId: id, contractorUid: p.contractorUid,
                        contractorMobile: p.contractorMobile || 'Check Profile',
                        labourUid: uid, labourName: userName, labourMobile: userMobile,
                        workName: p.workName, status: 'pending', createdAt: Date.now()
                    });
                    await update(ref(db, `posts/${id}`), { status: 'booked' });
                    alert("Booked Successfully! Contractor detail now in Active tab.");
                    switchSection('booked');
                }
            }, {onlyOnce: true});
        };

        function loadActiveWork() {
            onValue(ref(db, 'bookings'), (snap) => {
                const feed = document.getElementById('activeWorkFeed');
                feed.innerHTML = '';
                snap.forEach(child => {
                    const b = child.val();
                    if(b.labourUid === uid) {
                        const card = document.createElement('div');
                        card.className = 'job-card';
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between;">
                                <h4 style="margin:0;">${b.workName}</h4>
                                <span style="font-size:0.7rem; font-weight:800; color:var(--primary);">${b.status.toUpperCase()}</span>
                            </div>
                            <div class="contact-badge"><i class="fa-solid fa-phone"></i> CALL: ${b.contractorMobile}</div>
                            ${b.status==='confirmed' ? `
                                <div class="finish-preview-box" onclick="document.getElementById('finInp_${child.key}').click()">
                                    <div id="ph_${child.key}"><i class="fa-solid fa-camera" style="font-size:2rem; color:#ccc;"></i><br><small>TAP TO ADD FINISH PHOTO</small></div>
                                    <img id="prev_${child.key}" style="display:none">
                                </div>
                                <input type="file" id="finInp_${child.key}" style="display:none" onchange="handleFinishPrep('${child.key}', this)">
                                <button id="fBtn_${child.key}" class="finish-btn" onclick="submitFinish('${child.key}')">COMPLETE WORK</button>
                            ` : ''}
                        `;
                        feed.appendChild(card);
                    }
                });
            });
        }

        window.handleFinishPrep = (bid, inp) => {
            const f = inp.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = e => {
                    document.getElementById('prev_'+bid).src = e.target.result;
                    document.getElementById('prev_'+bid).style.display = 'block';
                    document.getElementById('ph_'+bid).style.display = 'none';
                    document.getElementById('fBtn_'+bid).style.display = 'block';
                };
                r.readAsDataURL(f);
            }
        };

        window.submitFinish = (bid) => {
            const img = document.getElementById('prev_'+bid).src;
            update(ref(db, `bookings/${bid}`), { status: 'finished', finishImage: img })
                .then(() => alert("Work Marked as Finished! Contractor notified."));
        };

        const av = localStorage.getItem('userAvatarUrl');
        if(av) document.getElementById('globalAvatar').src = av;
        loadJobFeed();
    </script>
</body>
</html>
