<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Labour Portal</title>
    <script>if (localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');</script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .content-section { display: none; animation: fadeIn 0.4s ease-out; padding-bottom: 120px; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .job-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .btn-apply { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 15px; font-weight: 700; cursor: pointer; }
        .booked-item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; float: right; }
        
        /* Finish UI */
        .finish-upload-area { margin-top: 15px; background: #f0f7ff; padding: 15px; border-radius: 15px; border: 1px dashed #007aff; text-align: center; cursor: pointer; position: relative; }
        .finish-upload-area i { font-size: 1.5rem; color: #007aff; margin-bottom: 8px; }
        .finish-upload-area img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text">AI <span>PVC</span></div>
            <div class="header-icons">
                <div class="bell-icon-wrapper" onclick="switchSection('news')"><i class="fa-solid fa-bell"></i></div>
                <img src="https://ui-avatars.com/api/?name=Labour" class="profile-avatar" id="globalAvatar" onclick="switchSection('more')">
            </div>
        </header>

        <div class="search-container" id="globalSearch">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search and reach your work...">
            </div>
        </div>

        <!-- SECTION: HOME -->
        <div id="section-home" class="content-section active">
            <div class="services-grid">
                <a href="estimator.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-calculator"></i></div><div class="service-name">Estimator</div></a>
                <a href="payments.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-wallet"></i></div><div class="service-name">Payments</div></a>
                <a href="materials.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-boxes-stacked"></i></div><div class="service-name">Materials</div></a>
                <a href="finished_works.html" class="service-item"><div class="icon-wrapper" style="background:#e8f5e9; color:#2e7d32;"><i class="fa-solid fa-circle-check"></i></div><div class="service-name">Finished Works</div></a>
                <a href="machinery.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-gears"></i></div><div class="service-name">Machinery</div></a>
                <a href="pvc_id.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-id-card"></i></div><div class="service-name">AI PVC ID</div></a>
                <a href="support.html" class="service-item"><div class="icon-wrapper"><i class="fa-solid fa-headset"></i></div><div class="service-name">Support</div></a>
            </div>
            <div style="margin: 20px 15px;"><img src="card1.jpeg" style="width: 100%; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: block;"></div>
        </div>

        <!-- SECTION: JOB -->
        <div id="section-job" class="content-section">
            <div style="padding: 20px;">
                <h3 style="margin-bottom: 15px; color: var(--text-dark);">Available Works In Your District</h3>
                <div id="districtJobsFeed"></div>
            </div>
        </div>

        <!-- SECTION: BOOKED -->
        <div id="section-booked" class="content-section">
            <div style="padding: 20px;">
                <h2 style="margin-bottom: 20px; color: var(--primary);">My Work Status</h2>
                <div id="myWorkStatusFeed"></div>
            </div>
        </div>

        <!-- SECTION: MORE (PREMIUM UI REFINED) -->
        <div id="section-more" class="content-section" style="padding: 20px;">
            <div class="more-profile-card" onclick="window.location.href='edit_profile.html'" style="display: flex; align-items: center; gap: 20px; padding: 25px 20px; background: white; border-radius: 25px; border: 1px solid #f0f0f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; cursor: pointer;">
                <img src="https://ui-avatars.com/api/?name=Labour" id="moreProfileAvatar" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ff3b30; object-fit: cover; padding: 3px; background: white;">
                <div class="more-profile-info">
                    <h2 id="labourNameDisplay" style="margin: 0; font-size: 1.4rem; font-weight: 800; color: #1a1a1a;">Labour Dashboard</h2>
                    <p style="margin: 5px 0 0; color: #8e8e93; font-size: 0.95rem; font-weight: 500;">View and edit details</p>
                </div>
                <i class="fa-solid fa-chevron-right" style="margin-left: auto; color: #d1d1d6; font-size: 1.1rem;"></i>
            </div>

            <div style="background: white; border-radius: 25px; border: 1px solid #f0f0f0; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
                <a href="work_history.html" style="display: flex; align-items: center; gap: 18px; padding: 22px 25px; text-decoration: none; border-bottom: 1px solid #f9f9f9;">
                    <i class="fa-solid fa-file-contract" style="color: #ff3b30; font-size: 1.3rem; width: 25px; text-align: center;"></i>
                    <span style="color: #1a1a1a; font-size: 1.1rem; font-weight: 700;">My Work History</span>
                </a>
                <a href="javascript:void(0)" onclick="handleLogout()" style="display: flex; align-items: center; gap: 18px; padding: 22px 25px; text-decoration: none;">
                    <i class="fa-solid fa-power-off" style="color: #ff3b30; font-size: 1.3rem; width: 25px; text-align: center;"></i>
                    <span style="color: #ff3b30; font-size: 1.1rem; font-weight: 700;">Log Out</span>
                </a>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" onclick="switchSection('home', this)"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('job', this)"><i class="fa-solid fa-briefcase"></i><span>Find Jobs</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('booked', this)"><i class="fa-solid fa-calendar-check"></i><span>My Work</span></a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchSection('more', this)"><i class="fa-solid fa-bars"></i><span>More</span></a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB7tt8p6hUZhrGvW58jSFhYFnB--7cI4Dg", authDomain: "ai-pvc.firebaseapp.com", projectId: "ai-pvc", storageBucket: "ai-pvc.firebasestorage.app", messagingSenderId: "674939624886", appId: "1:674939624886:web:7fa074e73af3449929f517" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const uid = localStorage.getItem('userUid');
        const userDistrict = (localStorage.getItem('userDistrict') || 'Chennai').toLowerCase();
        const userName = localStorage.getItem('userName') || 'Labour';

        window.switchSection = (id, el) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'job') fetchDistrictJobs();
            if(id === 'booked') fetchMyWorkStatus();
            window.scrollTo(0,0);
        };

        function fetchDistrictJobs() {
            const feed = document.getElementById('districtJobsFeed');
            onValue(ref(db, 'posts'), (snap) => {
                feed.innerHTML = '';
                let hasJobs = false;
                snap.forEach(child => {
                    const p = child.val();
                    if(p.district.toLowerCase() === userDistrict && p.status === 'available') {
                        hasJobs = true;
                        const card = document.createElement('div');
                        card.className = 'job-card';
                        card.innerHTML = `
                            <div style="font-weight:800; font-size:1.1rem; color:#333;">${p.workName}</div>
                            <div style="font-size:0.85rem; color:#666; margin:5px 0;"><i class="fa-solid fa-location-dot"></i> ${p.address}</div>
                            <img src="${p.workImage}" style="width:100%; height:130px; border-radius:10px; margin:10px 0; object-fit:cover;">
                            <button class="btn-apply" onclick="bookJob('${p.postId}', '${p.contractorUid}', '${p.workName}', '${p.contractorMobile || ''}')">Apply For Work</button>
                        `;
                        feed.appendChild(card);
                    }
                });
                if(!hasJobs) feed.innerHTML = '<p style="text-align:center; padding:50px; color:#aaa;">No available works in your district right now.</p>';
            });
        }

        window.bookJob = async (pid, cuid, wname, cmobile) => {
            if(!confirm("Send booking request to Contractor?")) return;
            const bRef = push(ref(db, 'bookings'));
            try {
                await update(ref(db, `posts/${pid}`), { status: 'booked' });
                await set(bRef, {
                    bookingId: bRef.key, postId: pid, contractorUid: cuid, contractorMobile: cmobile,
                    labourUid: uid, labourName: userName, labourMobile: localStorage.getItem('userMobile') || '',
                    workName: wname, status: 'pending', createdAt: Date.now()
                });
                alert("Request Sent! Job hidden from others.");
                switchSection('booked');
            } catch(e) { alert(e.message); }
        };

        function fetchMyWorkStatus() {
            const feed = document.getElementById('myWorkStatusFeed');
            onValue(ref(db, 'bookings'), (snap) => {
                feed.innerHTML = '';
                let hasWork = false;
                snap.forEach(child => {
                    const b = child.val();
                    if(b.labourUid === uid) {
                        hasWork = true;
                        let statusColor = b.status === 'confirmed' ? '#2e7d32' : (b.status==='finished' ? '#1565c0' : '#f39c12');
                        const card = document.createElement('div');
                        card.className = 'booked-item';
                        card.innerHTML = `
                            <span class="status-badge" style="background:${statusColor}; color:white;">${b.status.replace('_',' ')}</span>
                            <div style="font-weight:800; font-size:1.1rem; color:#333;">${b.workName}</div>
                            ${b.status === 'confirmed' ? `
                                <div style="margin-top:10px; display:flex; gap:10px;">
                                    <a href="tel:${b.contractorMobile}" style="flex:1; text-align:center; background:#f0f7ff; color:#007aff; padding:10px; border-radius:10px; text-decoration:none; font-weight:800; font-size:0.8rem;"><i class="fa-solid fa-phone"></i> CALL CONTRACTOR</a>
                                </div>
                                <div class="finish-upload-area" onclick="document.getElementById('input_${child.key}').click()">
                                    <input type="file" id="input_${child.key}" style="display:none;" onchange="previewFinishImage(this, '${child.key}')">
                                    <img id="img_${child.key}">
                                    <div id="text_${child.key}"><i class="fa-solid fa-cloud-arrow-up"></i><br><b style="font-size:0.8rem;">FINISH WORK? TAP TO UPLOAD IMAGE</b></div>
                                </div>
                                <button id="btn_${child.key}" class="btn-apply" onclick="submitFinishRequest('${child.key}')" style="display:none; background:#2e7d32;">SEND FINISH REQUEST</button>
                            ` : ''}
                            ${b.status === 'awaiting_approval' ? `<div style="margin-top:10px; color:#f39c12; font-weight:800; text-align:center;"><i class="fa-solid fa-clock"></i> Pending Approval from Contractor...</div>` : ''}
                        `;
                        feed.appendChild(card);
                    }
                });
                if(!hasWork) feed.innerHTML = '<p style="text-align:center; padding:50px; color:#aaa;">No work bookings found.</p>';
            });
        }

        window.previewFinishImage = (input, bid) => {
            const file = input.files[0];
            if (file) {
                const img = document.getElementById('img_' + bid);
                const txt = document.getElementById('text_' + bid);
                const btn = document.getElementById('btn_' + bid);
                
                // Clear any previous error states
                img.onerror = null;
                
                // Fast preview using object URL
                const url = URL.createObjectURL(file);
                img.src = url;
                img.style.display = 'block';
                txt.style.display = 'none';
                btn.style.display = 'block';
                
                // Clean up memory after image loads
                img.onload = () => URL.revokeObjectURL(url);
            }
        };

        window.submitFinishRequest = async (bid) => {
            const imgEl = document.getElementById('img_' + bid);
            const input = document.getElementById('input_' + bid);
            const file = input.files[0];
            
            if(!file) return alert("Please select a photo first!");
            
            // Show loading state on button
            const btn = document.getElementById('btn_' + bid);
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                // Convert to Base64 for database storage
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await update(ref(db, `bookings/${bid}`), { 
                        status: 'awaiting_approval', 
                        finishImage: e.target.result 
                    });
                    alert("Finish Request Sent! Waiting for Contractor to approve.");
                    btn.disabled = false;
                    btn.innerText = 'SEND FINISH REQUEST';
                };
                reader.readAsDataURL(file);
            } catch(e) { 
                alert(e.message); 
                btn.disabled = false;
                btn.innerText = 'SEND FINISH REQUEST';
            }
        };

        window.switchSection('home');
        if(localStorage.getItem('userAvatarUrl')) document.getElementById('globalAvatar').src = localStorage.getItem('userAvatarUrl');
        if(localStorage.getItem('userAvatarUrl')) document.getElementById('moreProfileAvatar').src = localStorage.getItem('userAvatarUrl');
        if(localStorage.getItem('userName')) document.getElementById('labourNameDisplay').innerText = localStorage.getItem('userName');
        window.handleLogout = () => { if(confirm('Logout?')) { localStorage.removeItem('isLoggedIn'); window.location.replace('login.html'); } };
    </script>
</body>
</html>
