<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Payments</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> AI <span>PAYMENTS</span>
            </div>
        </header>
        <div style="padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
            <div style="font-size: 5rem; color: var(--primary); margin-bottom: 30px;"><i class="fa-solid fa-wallet"></i></div>
            <h2 style="margin-bottom: 15px; font-weight: 800; font-size: 1.8rem;">Wallet & Payments</h2>
            <p style="color: #666; max-width: 300px; line-height: 1.5; font-size: 0.95rem;">Securely manage your earnings and transactions. Secure payment gateway integration coming soon.</p>
            
            <button class="btn-primary" 
                    style="margin-top: 40px; padding: 18px 45px; width: auto; border-radius: 15px; font-size: 1.1rem; font-weight: 800; box-shadow: 0 10px 20px rgba(234, 67, 53, 0.2);" 
                    onclick="window.history.back()">
                <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Go Back
            </button>
        </div>
    </div>
</body>
</html>
