<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Payments</title>
    <script>if(localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');</script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        
        <header class="top-header">
            <div class="brand-text">AI <span>PVC</span></div>
            <div class="header-icons">
                <i class="fa-regular fa-bell bell-icon" onclick="window.location.href='notifications.html'" style="cursor: pointer;"></i>
                <img src="https://ui-avatars.com/api/?name=User&background=random" id="navAvatarPay" class="profile-avatar">
                <script>if(localStorage.getItem('userAvatarUrl')) document.getElementById('navAvatarPay').src = localStorage.getItem('userAvatarUrl');</script>
            </div>
        </header>

        <div style="padding: 30px 20px;">
            <h2 style="color: var(--text-dark); margin-bottom: 20px;"><i class="fa-solid fa-credit-card"></i> Payments System</h2>
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
                <div style="text-align: center; margin-bottom: 25px;">
                    <span style="font-size: 0.9rem; color: var(--text-gray);">Current Wallet Balance</span>
                    <h1 style="color: #0f9d58; font-size: 2.2rem;">₹15,450.00</h1>
                </div>
                <button class="btn-primary" style="width: 100%; padding: 12px; margin-bottom: 10px;">Deposit Funds</button>
                <button class="btn-secondary" style="width: 100%; padding: 12px;" onclick="window.location.href='dashboard.html'">Return to Home</button>
            </div>
        </div>

    </div>
</body>
</html>
