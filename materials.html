<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Materials Marketplace</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f7f9fc; font-family: 'Outfit', sans-serif; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; margin-bottom: 100px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; }
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 0.9rem; font-weight: 700; color: #333; margin-bottom: 5px; line-height: 1.2; height: 34px; overflow: hidden; }
        .product-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-top: auto; }
        .product-old-price { font-size: 0.75rem; color: #999; text-decoration: line-through; margin-right: 5px; }
        .product-rating { font-size: 0.7rem; color: #ff9500; margin-bottom: 8px; }
        .back-btn-container { text-align: center; padding: 30px 20px 50px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="top-header" style="position: sticky; top: 0; z-index: 100;">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> AI <span>MATERIALS</span>
            </div>
        </header>

        <!-- Marketplace Banner -->
        <div style="margin: 15px; background: #fff; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #f0f0f0;">
            <h3 style="margin: 0; color: var(--primary); font-weight: 800;">PVC Marketplace</h3>
            <p style="margin: 5px 0 0; color: #888; font-size: 0.85rem;">Premium materials at wholesale prices</p>
        </div>

        <!-- Product Grid -->
        <div class="product-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <img src="Rigid PVC Pipe - 4 Inch (6 Feet).jpg" alt="PVC Pipe">
                <div class="product-info">
                    <div class="product-rating"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i> (4.5)</div>
                    <div class="product-title">Rigid PVC Pipe - 4 Inch (6 Feet)</div>
                    <div class="product-price"><span class="product-old-price">₹1450</span>₹1,249</div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <img src="Heavy Duty PVC Solvent Cement.png" alt="Solvent Cement">
                <div class="product-info">
                    <div class="product-rating"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i> (5.0)</div>
                    <div class="product-title">Heavy Duty PVC Solvent Cement</div>
                    <div class="product-price"><span class="product-old-price">₹350</span>₹299</div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <img src="Professional PVC Pipe Cutter.jpg" alt="Pipe Cutter">
                <div class="product-info">
                    <div class="product-rating"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i> (4.0)</div>
                    <div class="product-title">Professional PVC Pipe Cutter</div>
                    <div class="product-price"><span class="product-old-price">₹899</span>₹749</div>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="product-card">
                <img src="PVC Elbow Connector (Pack of 5).jpg" alt="Coupling">
                <div class="product-info">
                    <div class="product-rating"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i><i class="fa-regular fa-star"></i> (3.2)</div>
                    <div class="product-title">PVC Elbow Connector (Pack of 5)</div>
                    <div class="product-price"><span class="product-old-price">₹450</span>₹380</div>
                </div>
            </div>
        </div>

        <!-- Spacing for bottom -->
        <div style="height: 50px;"></div>
    </div>
</body>
</html>
