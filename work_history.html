<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Work History</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #ccc; }
        .history-card.completed { border-left-color: #4caf50; }
        .date { font-size: 0.75rem; color: #999; font-weight: 600; margin-bottom: 5px; }
    </style>
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>WORK HISTORY</span>
            </div>
        </header>
        <div style="padding: 20px;">
            <div class="history-card completed">
                <div class="date">OCT 12, 2025</div>
                <div style="font-weight: 700;">Complete PVC Pipe Installation</div>
                <div style="font-size: 0.85rem; color:#666;">Site: Rainbow Residency, Chennai</div>
                <div style="margin-top: 10px; color:#4caf50; font-size: 0.8rem; font-weight: 700;">Status: Verified Completed</div>
            </div>
            <div class="history-card completed">
                <div class="date">SEPT 05, 2025</div>
                <div style="font-weight: 700;">PVC Door Maintenance Service</div>
                <div style="font-size: 0.85rem; color:#666;">Client: Mr. Karthik (Individual)</div>
                <div style="margin-top: 10px; color:#4caf50; font-size: 0.8rem; font-weight: 700;">Status: Payment Released</div>
            </div>
            <button class="btn-primary" style="width: 100%; padding: 15px; border-radius: 40px; margin-top: 20px;" onclick="window.history.back()">Back Home</button>
        </div>
    </div>
</body>
</html>
