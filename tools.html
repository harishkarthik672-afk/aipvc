<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Tools</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>PROFESSIONAL TOOLS</span>
            </div>
        </header>
        <div style="padding: 30px 20px;">
            <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <i class="fa-solid fa-screwdriver-wrench" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
                <h3>Machinery & Tools</h3>
                <p style="color:#666; font-size: 0.9rem; margin: 10px 0;">Rent or buy professional tools for your PVC projects.</p>
                <div style="background: #fff8f8; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px dashed var(--primary);">
                    Advanced Tool Catalog coming soon to your district!
                </div>
            </div>
            <button class="btn-primary" style="margin-top: 30px; width: 100%; border-radius: 40px;" onclick="window.history.back()">Back Home</button>
        </div>
    </div>
</body>
</html>
