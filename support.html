<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Support</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>HELP & SUPPORT</span>
            </div>
        </header>
        <div style="padding: 20px;">
            <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;">
                <div style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"><i class="fa-solid fa-headset"></i></div>
                <h3>How can we help?</h3>
                <p style="color:#666; font-size: 0.9rem;">Chat with our support team or browse common questions.</p>
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="https://wa.me/919999999999" style="text-decoration:none; background: #25d366; color: white; padding: 15px; border-radius: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
                    </a>
                    <a href="tel:+919999999999" style="text-decoration:none; background: #f5f5f5; color: var(--text-dark); padding: 15px; border-radius: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fa-solid fa-phone"></i> Call Support Line
                    </a>
                </div>
            </div>
            <button class="btn-primary" style="width: 100%; padding: 15px; border-radius: 40px;" onclick="window.history.back()">Back Home</button>
        </div>
    </div>
</body>
</html>
