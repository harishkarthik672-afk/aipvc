<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Certification</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>SKILL CERTIFICATION</span>
            </div>
        </header>
        <div style="padding: 20px;">
            <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #ffd700;">
                <div style="font-size: 3rem; color: #ffd700; margin-bottom: 15px;"><i class="fa-solid fa-award"></i></div>
                <h3>Your Active Skills</h3>
                <div style="display:flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0;">
                    <span style="background:#fff3e0; color:#ef6c00; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">PVC Plumbing</span>
                    <span style="background:#e8f5e9; color:#2e7d32; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">Leak Repair</span>
                    <span style="background:#e3f2fd; color:#1565c0; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">Conduit Layout</span>
                </div>
                <p style="color: #666; font-size: 0.85rem;">You are in the Top 10% of verified PVC workers in your district.</p>
                <button class="btn-primary" style="width: 100%; margin-top: 20px; background:#ffd700; color:#333;">Get Premium Badge</button>
            </div>
            <button class="btn-primary" style="margin-top: 30px; width: 100%; border-radius: 40px;" onclick="window.history.back()">Back</button>
        </div>
    </div>
</body>
</html>
