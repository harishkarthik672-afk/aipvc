<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Services</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>SPECIALIZED SERVICES</span>
            </div>
        </header>
        <div style="padding: 20px;">
            <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;">
                <h3 style="color: var(--primary); margin-bottom: 15px;">Plumbing & Electrical</h3>
                <p style="color:#666; font-size: 0.95rem; line-height: 1.6;">Access our network of expert consultants and technical guides for complex installations.</p>
                <ul style="margin-top: 20px; color: #555; list-style: none; padding: 0;">
                    <li style="margin-bottom: 12px;"><i class="fa-solid fa-circle-check" style="color:#4caf50; margin-right: 10px;"></i> Technical Schematics</li>
                    <li style="margin-bottom: 12px;"><i class="fa-solid fa-circle-check" style="color:#4caf50; margin-right: 10px;"></i> Expert Consultation</li>
                    <li style="margin-bottom: 12px;"><i class="fa-solid fa-circle-check" style="color:#4caf50; margin-right: 10px;"></i> Safety Compliance Check</li>
                </ul>
            </div>
            <button class="btn-primary" style="width: 100%; padding: 15px; border-radius: 40px;" onclick="window.history.back()">Back</button>
        </div>
    </div>
