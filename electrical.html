<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Electrical</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        <header class="top-header">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer">
                <i class="fa-solid fa-arrow-left"></i> <span>ELECTRICAL SERVICES</span>
            </div>
        </header>
        <div style="padding: 20px;">
            <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                <i class="fa-solid fa-bolt" style="font-size: 3rem; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5); margin-bottom: 15px;"></i>
                <h3>Electrical Safety & Layouts</h3>
                <p style="color:#666; margin: 15px 0;">Professional electrical conduit planning and safety certifications for PVC installations.</p>
                <div style="background: #e1f5fe; color: #01579b; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 0.85rem;">
                    Service booking will be available shortly!
                </div>
            </div>
            <button class="btn-primary" style="margin-top: 30px; width: 100%; border-radius: 40px;" onclick="window.history.back()">Back Home</button>
        </div>
    </div>
