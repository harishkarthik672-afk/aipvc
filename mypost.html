<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - My Posts</title>
    <script>if(localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');</script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-card { background: white; padding: 20px; border-bottom: 5px solid var(--bg-light); margin-bottom: 10px; }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .post-meta { display: flex; gap: 10px; align-items: center; }
        .post-meta img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .post-meta h4 { font-size: 0.95rem; color: var(--text-dark); margin-bottom: 2px; }
        .post-meta span { font-size: 0.75rem; color: var(--text-gray); }
        .post-opts { color: var(--text-gray); cursor: pointer; }
        .post-title { font-size: 1.05rem; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
        .post-desc { font-size: 0.85rem; color: var(--text-gray); line-height: 1.5; margin-bottom: 10px; display:flex; flex-direction:column; gap:5px; }
        .post-stats { display: flex; gap: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .stat-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-gray); font-weight: 500; }
        .stat-item i { color: var(--primary); }
    </style>
</head>
<body style="background-color: var(--bg-light);">
    <div class="app-container">
        
        <!-- Standard Global Header -->
        <header class="top-header">
            <div class="brand-text">
                AI <span>PVC</span>
            </div>
            <div class="header-icons">
                <i class="fa-regular fa-bell bell-icon" onclick="window.location.href='notifications.html'" style="cursor: pointer;"></i>
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-avatar" id="navAvatar2">
                <script>if(localStorage.getItem('userAvatarUrl')) document.getElementById('navAvatar2').src = localStorage.getItem('userAvatarUrl');</script>
            </div>
        </header>

        <!-- Standard Search Bar -->
        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search PVC network near me">
                <i class="fa-solid fa-microphone mic-icon"></i>
            </div>
        </div>

        <div id="postsFeedContainer" style="padding-bottom: 20px;">
            <div id="loader" style="text-align: center; padding: 40px; color: var(--primary); font-size: 1.5rem;"><i class="fa-solid fa-spinner fa-spin"></i></div>
            <!-- Dynamic Posts from Database will load here -->
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="post.html" class="nav-item">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>Post</span>
            </a>
            <a href="mypost.html" class="nav-item active">
                <i class="fa-solid fa-images"></i>
                <span>My Post</span>
            </a>
            <a href="news.html" class="nav-item">
                <div class="nav-badge-wrapper">
                    <i class="fa-regular fa-newspaper"></i>
                    <span class="nav-badge">4</span>
                </div>
                <span>News</span>
            </a>
            <a href="more.html" class="nav-item">
                <i class="fa-solid fa-bars"></i>
                <span>More</span>
            </a>
        </nav>

    </div>

    <!-- Firebase Fetch Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7tt8p6hUZhrGvW58jSFhYFnB--7cI4Dg",
            authDomain: "ai-pvc.firebaseapp.com",
            projectId: "ai-pvc",
            storageBucket: "ai-pvc.firebasestorage.app",
            messagingSenderId: "674939624886",
            appId: "1:674939624886:web:7fa074e73af3449929f517"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function fetchPosts() {
            try {
                const snapshot = await get(child(ref(db), `posts`));
                const feedContainer = document.getElementById('postsFeedContainer');
                feedContainer.innerHTML = ''; // clear loader

                if(!snapshot.exists()) {
                    feedContainer.innerHTML = '<div style="text-align:center; padding: 40px; color:#777;">No posts found yet. Create one!</div>';
                    return;
                }

                let postsArray = [];
                snapshot.forEach((childSnapshot) => {
                    postsArray.push({ id: childSnapshot.key, ...childSnapshot.val() });
                });

                // Sort newest descending
                postsArray.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

                postsArray.forEach((data) => {
                    let timeOutput = "Recently";
                    if(data.createdAt) {
                        const seconds = Math.floor((new Date() - data.createdAt) / 1000);
                        if(seconds < 60) timeOutput = "Just now";
                        else if(seconds < 3600) timeOutput = Math.floor(seconds/60) + " min ago";
                        else if(seconds < 86400) timeOutput = Math.floor(seconds/3600) + " hours ago";
                        else timeOutput = Math.floor(seconds/86400) + " days ago";
                    }

                    const card = document.createElement('div');
                    card.className = "post-card";
                    
                    let imageHTML = "";
                    if(data.image) {
                        imageHTML = `<img src="${data.image}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; margin-bottom: 10px;">`;
                    }

                    card.innerHTML = `
                        <div class="post-header">
                            <div class="post-meta">
                                <img src="${data.userAvatar || 'https://ui-avatars.com/api/?name=User'}">
                                <div>
                                    <h4>You</h4>
                                    <span>${timeOutput}</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-ellipsis-vertical post-opts"></i>
                        </div>
                        <div class="post-title" style="color: var(--primary);">${data.workName}</div>
                        
                        ${imageHTML}

                        <div class="post-desc">
                            <span><b><i class="fa-solid fa-ruler-combined"></i> Area:</b> ${data.squareFit}</span>
                            <span><b><i class="fa-solid fa-location-dot"></i> District:</b> ${data.district}</span>
                            <span><b><i class="fa-regular fa-map"></i> Address:</b> ${data.address}</span>
                        </div>
                        <div class="post-stats">
                            <div class="stat-item"><i class="fa-regular fa-eye"></i> 0 Views</div>
                            <div class="stat-item"><i class="fa-regular fa-comment"></i> 0 Replies</div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });

            } catch(e) {
                console.error("Error fetching data: ", e);
                document.getElementById('postsFeedContainer').innerHTML = '<div style="text-align:center; padding: 40px; color:red;">Failed to load Database.</div>';
            }
        }

        fetchPosts();
    </script>
</body>
</html>
