<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Active Bookings</title>
    <script>if(localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');</script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #f0f0f0; border-left: 6px solid var(--primary); }
        .fixed-bottom-btn { position: fixed; bottom: 20px; left: 15px; right: 15px; z-index: 1000; }
        .btn-home-red { background: #e74c3c; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: 800; box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body style="background-color: #f7f9fc;">
    <div class="app-container" style="padding-bottom: 100px;">
        <!-- Header -->
        <header class="top-header">
            <div class="brand-text">AI <span>LABOURS</span></div>
            <div class="header-icons">
                <div class="bell-icon-wrapper" onclick="window.location.href='notifications.html'">
                    <i class="fa-solid fa-bell"></i>
                </div>
                <img src="https://ui-avatars.com/api/?name=User" id="navAvatarLab" class="profile-avatar">
            </div>
        </header>

        <div style="padding: 20px;">
            <h2 style="color: var(--text-dark); margin-bottom: 20px;"><i class="fa-solid fa-calendar-check" style="color: var(--primary);"></i> Active Booking Details</h2>
            
            <div id="bookingListFeed">
                <div style="text-align:center; padding:50px; color:#aaa;">Loading bookings...</div>
            </div>
        </div>

        <!-- Stable Red Bottom Button -->
        <div class="fixed-bottom-btn">
            <button class="btn-home-red" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-house" style="margin-right: 10px;"></i> Return to Dashboard
            </button>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB7tt8p6hUZhrGvW58jSFhYFnB--7cI4Dg", authDomain: "ai-pvc.firebaseapp.com", projectId: "ai-pvc", storageBucket: "ai-pvc.firebasestorage.app", messagingSenderId: "674939624886", appId: "1:674939624886:web:7fa074e73af3449929f517" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const uid = localStorage.getItem('userUid');
        if(localStorage.getItem('userAvatarUrl')) document.getElementById('navAvatarLab').src = localStorage.getItem('userAvatarUrl');

        // Fetch bookings intended for this contractor
        onValue(ref(db, 'bookings'), (snap) => {
            const feed = document.getElementById('bookingListFeed');
            feed.innerHTML = '';
            let count = 0;
            snap.forEach(child => {
                const b = child.val();
                if(b.contractorUid === uid) {
                    count++;
                    const card = document.createElement('div');
                    card.className = 'booking-card';
                    card.innerHTML = `
                        <div style="font-weight: 800; font-size: 1.1rem; color: #333;">${b.labourName}</div>
                        <div style="font-size: 0.85rem; color: var(--primary); font-weight: 700; margin: 3px 0 10px;">Interested in: ${b.workName}</div>
                        <div style="display: flex; gap: 15px; font-size: 0.8rem; color: #666;">
                            <span><i class="fa-solid fa-phone"></i> ${b.labourMobile || 'Not Provided'}</span>
                            <span style="background: #eef2f7; padding: 2px 8px; border-radius: 4px; color: #27ae60; font-weight: 800;">STATUS: ${b.status.toUpperCase()}</span>
                        </div>
                    `;
                    feed.appendChild(card);
                }
            });
            if(count === 0) feed.innerHTML = '<div style="text-align:center; padding:50px; color:#aaa;">No labours have booked your jobs yet.</div>';
        });
    </script>
</body>
</html>
