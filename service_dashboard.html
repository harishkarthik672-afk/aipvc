<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PVC - Service Dashboard</title>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') { 
            window.location.replace('login.html'); 
        } else {
            const expiry = localStorage.getItem('subscriptionExpiry');
            if (!expiry || parseInt(expiry) < Date.now()) {
                window.location.replace('login.html');
            }
        }
    </script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 2px solid #ff0000; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: #ff0000; margin: 5px 0; }
        .stat-label { font-size: 0.75rem; color: #444; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .subscription-card { background: white; margin: 20px 15px; padding: 20px; border-radius: 15px; border: 2px solid #ff0000; text-align: center; }
        .sub-days { font-size: 2.5rem; font-weight: 900; color: #ff0000; }
        .sub-label { color: #555; font-weight: 600; margin-bottom: 5px; }
        
        .activity-card { background: white; margin: 10px 15px; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .activity-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon { width: 40px; height: 40px; border-radius: 10px; background: #fff5f5; color: #ff0000; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    </style>
</head>
<body style="background-color: #fcebeb;">
    <div class="app-container">
        <!-- Header -->
        <header class="top-header" style="background: #ff0000; color: white;">
            <div class="brand-text" onclick="window.history.back()" style="cursor:pointer; color: white;">
                <i class="fa-solid fa-arrow-left"></i> <span>MY ACCOUNT STATUS</span>
            </div>
            <div class="header-icons" style="color: white;">
                <div class="bell-icon-wrapper"><i class="fa-solid fa-bell"></i></div>
            </div>
        </header>

        <!-- Subscription Info -->
        <div class="subscription-card">
            <div class="sub-label">Subscription Remaining</div>
            <div class="sub-days" id="daysLeft">--</div>
            <div style="font-size: 0.8rem; color: #888; font-weight: 600;">DAYS UNTIL NEXT PAYMENT</div>
        </div>

        <!-- Dynamic Statistics -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Works Posted</div>
                <div class="stat-val" id="totalPosted">0</div>
                <div style="font-size: 0.65rem; color: #666;">ALL TIME POSTS</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Works Finished</div>
                <div class="stat-val" id="totalFinished">0</div>
                <div style="font-size: 0.65rem; color: #666;">COMPLETED JOBS</div>
            </div>
            <div class="stat-card" style="grid-column: span 2;">
                <div class="stat-label">Network Reach (Views)</div>
                <div class="stat-val" id="totalViews">0</div>
                <div style="font-size: 0.65rem; color: #666;">TOTAL PEOPLE REACHED</div>
            </div>
        </div>

        <!-- System Logic -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
            import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyB7tt8p6hUZhrGvW58jSFhYFnB--7cI4Dg",
                authDomain: "ai-pvc.firebaseapp.com",
                projectId: "ai-pvc",
                storageBucket: "ai-pvc.firebasestorage.app",
                messagingSenderId: "674939624886",
                appId: "1:674939624886:web:7fa074e73af3449929f517"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const uid = localStorage.getItem('userUid');

            // 1. Calculate Days Left
            const expiry = localStorage.getItem('subscriptionExpiry');
            if (expiry) {
                const diffTime = Math.max(0, parseInt(expiry) - Date.now());
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                document.getElementById('daysLeft').innerText = diffDays;
            }

            // 2. Fetch Stats from Firebase
            onValue(ref(db, 'posts'), (snapshot) => {
                let postCount = 0;
                let viewCount = 0;
                snapshot.forEach((child) => {
                    const data = child.val();
                    if (data.contractorUid === uid) {
                        postCount++;
                        // If you have a views field, add it here. For now show real logic.
                        if (data.views) viewCount += data.views;
                    }
                });
                document.getElementById('totalPosted').innerText = postCount;
                document.getElementById('totalViews').innerText = viewCount;
            });

            onValue(ref(db, 'bookings'), (snapshot) => {
                let finishCount = 0;
                snapshot.forEach((child) => {
                    const data = child.val();
                    if (data.contractorUid === uid && data.status === 'finished') {
                        finishCount++;
                    }
                });
                document.getElementById('totalFinished').innerText = finishCount;
            });

        </script>

        <div style="padding: 20px;">
            <button class="btn-primary" style="width: 100%; padding: 15px; border-radius: 40px; background: #ff0000;" onclick="window.history.back()">Back to Home</button>
        </div>
    </div>
</body>
</html>
